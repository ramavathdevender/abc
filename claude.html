<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Claude AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 30px 16px; }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #a78bfa; }
    p.sub { color: #888; margin-bottom: 24px; }
    .card { background: #16213e; border-radius: 12px; padding: 24px; width: 100%; max-width: 720px; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    label { font-size: 0.85rem; color: #a0aec0; display: block; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #2d3748; background: #0f3460; color: #eee;
      font-size: 0.95rem; margin-bottom: 16px; outline: none;
    }
    input:focus, textarea:focus { border-color: #a78bfa; }
    textarea { resize: vertical; min-height: 100px; }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #7c3aed; color: white; font-size: 1rem;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #4a5568; cursor: not-allowed; }
    .response-box {
      margin-top: 20px; background: #0f3460; border-radius: 8px;
      padding: 16px; white-space: pre-wrap; line-height: 1.6;
      min-height: 60px; color: #e2e8f0; border: 1px solid #2d3748;
      display: none;
    }
    .response-box.visible { display: block; }
    .meta { font-size: 0.78rem; color: #718096; margin-top: 10px; text-align: right; }
    .error { color: #fc8181; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Explore Claude AI</h1>
  <p class="sub">Chat with Claude directly from your browser</p>

  <div class="card">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />

    <label>Model</label>
    <select id="model">
      <option value="claude-opus-4-6">Claude Opus 4.6 (Most Powerful)</option>
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Balanced)</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5 (Fast)</option>
    </select>

    <label>System Prompt (optional)</label>
    <input type="text" id="system" placeholder="You are a helpful assistant..." />

    <label>Your Message</label>
    <textarea id="prompt" placeholder="Ask Claude anything..."></textarea>

    <button id="sendBtn" onclick="sendMessage()">Send to Claude</button>

    <div class="response-box" id="responseBox"></div>
    <div class="meta" id="meta"></div>
  </div>

  <script>
    async function sendMessage() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value;
      const system = document.getElementById('system').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const btn = document.getElementById('sendBtn');
      const box = document.getElementById('responseBox');
      const meta = document.getElementById('meta');

      if (!apiKey) return alert('Please enter your API key.');
      if (!prompt) return alert('Please enter a message.');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Thinking...';
      box.className = 'response-box visible';
      box.textContent = '';
      meta.textContent = '';

      const body = {
        model,
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }]
      };
      if (system) body.system = system;

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          box.innerHTML = `<span class="error">Error ${res.status}: ${data.error?.message || 'Unknown error'}</span>`;
        } else {
          const text = data.content?.find(b => b.type === 'text')?.text ?? '(no response)';
          box.textContent = text;
          meta.textContent = `Model: ${data.model} | Input tokens: ${data.usage?.input_tokens} | Output tokens: ${data.usage?.output_tokens}`;
        }
      } catch (err) {
        box.innerHTML = `<span class="error">Network error: ${err.message}</span>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send to Claude';
      }
    }

    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMessage();
    });
  </script>
</body>
</html>
